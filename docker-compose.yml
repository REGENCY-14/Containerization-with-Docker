version: '3.8'

services:
  selenium-tests:
    build:
      context: .
      dockerfile: Dockerfile

    image: selenium-tests:latest
    container_name: selenium-tests-run

    # Give Chrome enough shared memory — without this Chrome will crash
    shm_size: '2gb'

    # /output is where entrypoint.sh copies results after the test run.
    # This avoids mounting over /app/target which would block mvn clean.
    volumes:
      - ./target:/output

    environment:
      - DOCKER=true
      - BROWSER=chrome
      - HEADLESS=true
      - TEST_TIMEOUT_MINUTES=30

    restart: "no"
