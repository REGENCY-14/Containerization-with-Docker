# Allure Configuration Properties
# This file configures Allure report generation settings

# Results directory where Allure stores test execution data
allure.results.directory=target/allure-results

# Link patterns for issue tracking (optional)
allure.link.issue.pattern=https://github.com/your-org/your-repo/issues/{}
allure.link.tms.pattern=https://github.com/your-org/your-repo/issues/{}

# Report configuration
allure.report.name=Swag Labs UI Automation Test Report
allure.report.version=1.0.0

# Environment information
environment.browser=${browser}
environment.headless=${headless}
environment.java.version=${java.version}
environment.os.name=${os.name}
environment.os.version=${os.version}