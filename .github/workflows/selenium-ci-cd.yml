name: Selenium UI Automation Tests

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # -------------------------------------------------------------------------
    # Cache Docker layers using GitHub Actions cache.
    # The cache key is based on the Dockerfile and entrypoint so it only
    # invalidates when those files actually change, not on every push.
    # -------------------------------------------------------------------------
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'entrypoint.sh', 'pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    # -------------------------------------------------------------------------
    # Build the Docker image with layer cache enabled.
    # cache-from/cache-to reuses layers from previous runs stored in the cache.
    # -------------------------------------------------------------------------
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        load: true
        tags: selenium-tests:latest
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

    # Rotate cache to prevent unbounded growth
    - name: Rotate build cache
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache

    # -------------------------------------------------------------------------
    # Create the output directory on the runner before mounting it.
    # The container's entrypoint.sh copies results here after tests finish.
    # -------------------------------------------------------------------------
    - name: Prepare output directory
      run: mkdir -p ${{ github.workspace }}/target

    # -------------------------------------------------------------------------
    # Run tests inside the Docker container.
    # --shm-size=2g        → prevents Chrome crashing due to low shared memory
    # -v .../target:/output → entrypoint copies results here after tests finish
    # pipefail + tee       → captures Maven output AND preserves the exit code
    # TEST_TIMEOUT_MINUTES → kills hung tests after 25 min (CI job limit is 30)
    # -------------------------------------------------------------------------
    - name: Run tests in Docker
      run: |
        set -o pipefail
        docker run \
          --shm-size=2g \
          -v ${{ github.workspace }}/target:/output \
          -e TEST_TIMEOUT_MINUTES=25 \
          --name selenium-tests-run \
          selenium-tests

    # -------------------------------------------------------------------------
    # Fetch the gh-pages branch so Allure can append to the existing history.
    # continue-on-error: true handles the case where gh-pages doesn't exist yet.
    # -------------------------------------------------------------------------
    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    # -------------------------------------------------------------------------
    # Generate the Allure HTML report from the results copied out of Docker.
    # allure_results points to the directory populated by entrypoint.sh.
    # -------------------------------------------------------------------------
    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: target/allure-results
        allure_history: allure-history
        keep_reports: 20

    - name: Deploy Allure report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: ./allure-report

    - name: Upload Allure results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: target/allure-results
        retention-days: 30

    - name: Upload Allure report as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-history
        retention-days: 30

    - name: Upload Surefire reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports
        path: target/surefire-reports
        retention-days: 30

    # -------------------------------------------------------------------------
    # Print a per-class test breakdown in the GitHub Actions summary tab.
    # Reads from the surefire XML files copied out of the container.
    # -------------------------------------------------------------------------
    - name: Test Report Summary
      if: always()
      run: |
        echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ -d "target/surefire-reports" ]; then
          echo "### Test Results:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          total_tests=0
          total_failures=0
          total_errors=0

          while IFS= read -r file; do
            if [ -f "$file" ]; then
              tests=$(grep -o 'tests="[0-9]*"' "$file" | grep -o '[0-9]*' | head -1)
              failures=$(grep -o 'failures="[0-9]*"' "$file" | grep -o '[0-9]*' | head -1)
              errors=$(grep -o 'errors="[0-9]*"' "$file" | grep -o '[0-9]*' | head -1)
              name=$(grep -o 'name="[^"]*"' "$file" | head -1 | cut -d'"' -f2)

              if [ -n "$tests" ]; then
                total_tests=$((total_tests + tests))
                total_failures=$((total_failures + ${failures:-0}))
                total_errors=$((total_errors + ${errors:-0}))
                echo "- **$name**: $tests tests, $failures failures, $errors errors" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done < <(find target/surefire-reports -name "TEST-*.xml")

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total**: $total_tests tests, $total_failures failures, $total_errors errors" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ No test results found" >> $GITHUB_STEP_SUMMARY
        fi

    # -------------------------------------------------------------------------
    # Parse the final Maven summary line from the captured container output.
    # Maven prints one rolled-up "Tests run: X" line after "[INFO] Results:"
    # which is the single source of truth for the Slack notification counts.
    # -------------------------------------------------------------------------
    - name: Extract test results
      if: always()
      id: test_results
      run: |
        COMMIT_SHA=${GITHUB_SHA:0:7}
        TOTAL=0
        FAILED=0
        SKIPPED=0

        # Primary: parse surefire XML files copied out of the container by entrypoint.sh
        # This is the most reliable source — same data Allure reads
        if ls target/surefire-reports/TEST-*.xml >/dev/null 2>&1; then
          echo "Parsing from surefire XML files..."
          for file in target/surefire-reports/TEST-*.xml; do
            filename=$(basename "$file")
            # Skip suite runner files — they re-report the same tests
            if echo "$filename" | grep -q 'Suite'; then
              echo "  Skipping suite file: $filename"
              continue
            fi
            tests=$(grep -m1 '<testsuite ' "$file" | grep -o 'tests="[0-9]*"' | grep -o '[0-9]*')
            failures=$(grep -m1 '<testsuite ' "$file" | grep -o 'failures="[0-9]*"' | grep -o '[0-9]*')
            errors=$(grep -m1 '<testsuite ' "$file" | grep -o 'errors="[0-9]*"' | grep -o '[0-9]*')
            skipped=$(grep -m1 '<testsuite ' "$file" | grep -o 'skipped="[0-9]*"' | grep -o '[0-9]*')
            echo "  $filename: tests=${tests:-0} failures=${failures:-0} errors=${errors:-0} skipped=${skipped:-0}"
            TOTAL=$((TOTAL + ${tests:-0}))
            FAILED=$((FAILED + ${failures:-0} + ${errors:-0}))
            SKIPPED=$((SKIPPED + ${skipped:-0}))
          done
        else
          echo "No surefire XML files found — results may not have been copied out of container"
        fi

        PASSED=$((TOTAL - FAILED - SKIPPED))
        echo "=== FINAL: total=$TOTAL passed=$PASSED failed=$FAILED skipped=$SKIPPED ==="

        echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
        echo "total=$TOTAL"           >> $GITHUB_OUTPUT
        echo "passed=$PASSED"         >> $GITHUB_OUTPUT
        echo "failed=$FAILED"         >> $GITHUB_OUTPUT
        echo "skipped=$SKIPPED"       >> $GITHUB_OUTPUT

    - name: Slack notification
      if: always()
      uses: slackapi/slack-github-action@v1.27.0
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      with:
        payload: |
          {
            "text": "CI Pipeline Status\n\n:package: Repository: ${{ github.repository }}\n:herb: Branch: ${{ github.ref_name }}\n:receipt: Commit: ${{ steps.test_results.outputs.commit_sha }}\n:bar_chart: Status: ${{ job.status }}\n\n━━━━━━━━━━━━━━━━━━\n:chart_with_upwards_trend: Test Summary\n• Total Tests: ${{ steps.test_results.outputs.total }}\n• Passed: ${{ steps.test_results.outputs.passed }}\n• Failed: ${{ steps.test_results.outputs.failed }}\n• Skipped: ${{ steps.test_results.outputs.skipped }}\n━━━━━━━━━━━━━━━━━━\n\n:link: Run Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
