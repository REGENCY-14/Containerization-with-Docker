name: Selenium CI/CD Pipeline with Allure Reports

on:
  push:
    branches: [ main, dev, feature/** ]
  pull_request:
    branches: [ main, dev ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: true
        default: 'chrome'
        type: choice
        options:
        - chrome
        - firefox
        - edge
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - login
        - smoke
      headless:
        description: 'Run in headless mode'
        required: true
        default: true
        type: boolean

jobs:
  # Main test execution job with matrix strategy
  test:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    
    strategy:
      matrix:
        browser: [chrome, firefox]
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Install Chrome browser
      uses: browser-actions/setup-chrome@latest
      
    - name: Install Firefox browser
      uses: browser-actions/setup-firefox@latest
      
    - name: Run tests with Maven
      run: |
        mvn clean test -Dbrowser=${{ matrix.browser }} -Dheadless=true
      env:
        DISPLAY: :99
        
    - name: Generate Allure Report
      if: always()
      run: |
        mvn allure:report
        
    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.browser }}
        path: target/allure-results/
        retention-days: 30
        
    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-${{ matrix.browser }}
        path: target/allure-report/
        retention-days: 30
        
    - name: Upload Test Screenshots (if any)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-screenshots-${{ matrix.browser }}
        path: target/screenshots/
        retention-days: 7
        if-no-files-found: ignore
        
    - name: Parse Test Results
      if: always()
      id: test-results
      run: |
        # Parse surefire reports to get test statistics
        if [ -f "target/surefire-reports/TEST-*.xml" ]; then
          TOTAL=$(grep -o 'tests="[0-9]*"' target/surefire-reports/TEST-*.xml | grep -o '[0-9]*' | awk '{sum += $1} END {print sum}')
          FAILURES=$(grep -o 'failures="[0-9]*"' target/surefire-reports/TEST-*.xml | grep -o '[0-9]*' | awk '{sum += $1} END {print sum}')
          ERRORS=$(grep -o 'errors="[0-9]*"' target/surefire-reports/TEST-*.xml | grep -o '[0-9]*' | awk '{sum += $1} END {print sum}')
          SKIPPED=$(grep -o 'skipped="[0-9]*"' target/surefire-reports/TEST-*.xml | grep -o '[0-9]*' | awk '{sum += $1} END {print sum}')
          
          # Handle empty values
          TOTAL=${TOTAL:-0}
          FAILURES=${FAILURES:-0}
          ERRORS=${ERRORS:-0}
          SKIPPED=${SKIPPED:-0}
          
          PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))
          
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$((FAILURES + ERRORS))" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
        else
          echo "total=0" >> $GITHUB_OUTPUT
          echo "passed=0" >> $GITHUB_OUTPUT
          echo "failed=0" >> $GITHUB_OUTPUT
          echo "skipped=0" >> $GITHUB_OUTPUT
        fi
        
    - name: Notify Slack - Test Results
      if: always()
      uses: slackapi/slack-github-action@v1.27.0
      with:
        payload: |
          {
            "text": "🧪 Selenium Test Results - ${{ matrix.browser }}",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🧪 Selenium Test Execution Complete"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Repository:*\n${{ github.repository }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n${{ github.ref_name }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Commit SHA:*\n${{ github.sha }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Browser:*\n${{ matrix.browser }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Job Status:*\n${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Trigger:*\n${{ github.event_name }}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Test Summary:*\n📊 Total: ${{ steps.test-results.outputs.total }} | ✅ Passed: ${{ steps.test-results.outputs.passed }} | ❌ Failed: ${{ steps.test-results.outputs.failed }} | ⏭️ Skipped: ${{ steps.test-results.outputs.skipped }}"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View GitHub Actions Run"
                    },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Scheduled and manual test execution
  scheduled-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Install browsers
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable firefox
        
    - name: Set test parameters
      id: test-params
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "browser=${{ github.event.inputs.browser }}" >> $GITHUB_OUTPUT
          echo "headless=${{ github.event.inputs.headless }}" >> $GITHUB_OUTPUT
          echo "test_suite=${{ github.event.inputs.test_suite }}" >> $GITHUB_OUTPUT
        else
          echo "browser=chrome" >> $GITHUB_OUTPUT
          echo "headless=true" >> $GITHUB_OUTPUT
          echo "test_suite=all" >> $GITHUB_OUTPUT
        fi
        
    - name: Run tests
      run: |
        if [ "${{ steps.test-params.outputs.test_suite }}" = "login" ]; then
          mvn test -Dtest=LoginTest -Dbrowser=${{ steps.test-params.outputs.browser }} -Dheadless=${{ steps.test-params.outputs.headless }}
        elif [ "${{ steps.test-params.outputs.test_suite }}" = "smoke" ]; then
          mvn test -Dgroups=smoke -Dbrowser=${{ steps.test-params.outputs.browser }} -Dheadless=${{ steps.test-params.outputs.headless }}
        else
          mvn test -Dbrowser=${{ steps.test-params.outputs.browser }} -Dheadless=${{ steps.test-params.outputs.headless }}
        fi
        
    - name: Generate Allure Report
      if: always()
      run: mvn allure:report
      
    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: scheduled-allure-results-${{ steps.test-params.outputs.browser }}
        path: target/allure-results/
        retention-days: 30
        
    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: scheduled-test-report-${{ steps.test-params.outputs.browser }}
        path: target/surefire-reports/
        retention-days: 30
        
    - name: Parse Scheduled Test Results
      if: always()
      id: scheduled-test-results
      run: |
        # Parse surefire reports to get test statistics
        if [ -f "target/surefire-reports/TEST-*.xml" ]; then
          TOTAL=$(grep -o 'tests="[0-9]*"' target/surefire-reports/TEST-*.xml | grep -o '[0-9]*' | awk '{sum += $1} END {print sum}')
          FAILURES=$(grep -o 'failures="[0-9]*"' target/surefire-reports/TEST-*.xml | grep -o '[0-9]*' | awk '{sum += $1} END {print sum}')
          ERRORS=$(grep -o 'errors="[0-9]*"' target/surefire-reports/TEST-*.xml | grep -o '[0-9]*' | awk '{sum += $1} END {print sum}')
          SKIPPED=$(grep -o 'skipped="[0-9]*"' target/surefire-reports/TEST-*.xml | grep -o '[0-9]*' | awk '{sum += $1} END {print sum}')
          
          # Handle empty values
          TOTAL=${TOTAL:-0}
          FAILURES=${FAILURES:-0}
          ERRORS=${ERRORS:-0}
          SKIPPED=${SKIPPED:-0}
          
          PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))
          
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$((FAILURES + ERRORS))" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
        else
          echo "total=0" >> $GITHUB_OUTPUT
          echo "passed=0" >> $GITHUB_OUTPUT
          echo "failed=0" >> $GITHUB_OUTPUT
          echo "skipped=0" >> $GITHUB_OUTPUT
        fi
        
    - name: Notify Slack - Scheduled Test Results
      if: always()
      uses: slackapi/slack-github-action@v1.27.0
      with:
        payload: |
          {
            "text": "⏰ Scheduled Selenium Test Results",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "⏰ Scheduled Selenium Test Execution Complete"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Repository:*\n${{ github.repository }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n${{ github.ref_name }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Commit SHA:*\n${{ github.sha }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Browser:*\n${{ steps.test-params.outputs.browser }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Job Status:*\n${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Test Suite:*\n${{ steps.test-params.outputs.test_suite }}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Test Summary:*\n📊 Total: ${{ steps.scheduled-test-results.outputs.total }} | ✅ Passed: ${{ steps.scheduled-test-results.outputs.passed }} | ❌ Failed: ${{ steps.scheduled-test-results.outputs.failed }} | ⏭️ Skipped: ${{ steps.scheduled-test-results.outputs.skipped }}"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View GitHub Actions Run"
                    },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Security scanning for pull requests
  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Run OWASP Dependency Check
      run: |
        mvn org.owasp:dependency-check-maven:check
        
    - name: Upload Security Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: target/dependency-check-report.html
        retention-days: 30
        
    - name: Parse Security Scan Results
      if: always()
      id: security-results
      run: |
        # Check if security report exists and parse results
        if [ -f "target/dependency-check-report.html" ]; then
          # Extract vulnerability counts from the HTML report
          CRITICAL=$(grep -o "Critical.*[0-9]" target/dependency-check-report.html | grep -o "[0-9]*" | head -1 || echo "0")
          HIGH=$(grep -o "High.*[0-9]" target/dependency-check-report.html | grep -o "[0-9]*" | head -1 || echo "0")
          MEDIUM=$(grep -o "Medium.*[0-9]" target/dependency-check-report.html | grep -o "[0-9]*" | head -1 || echo "0")
          LOW=$(grep -o "Low.*[0-9]" target/dependency-check-report.html | grep -o "[0-9]*" | head -1 || echo "0")
          
          # Handle empty values
          CRITICAL=${CRITICAL:-0}
          HIGH=${HIGH:-0}
          MEDIUM=${MEDIUM:-0}
          LOW=${LOW:-0}
          
          TOTAL=$((CRITICAL + HIGH + MEDIUM + LOW))
          
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
          echo "low=$LOW" >> $GITHUB_OUTPUT
          echo "scan_completed=true" >> $GITHUB_OUTPUT
        else
          echo "total=0" >> $GITHUB_OUTPUT
          echo "critical=0" >> $GITHUB_OUTPUT
          echo "high=0" >> $GITHUB_OUTPUT
          echo "medium=0" >> $GITHUB_OUTPUT
          echo "low=0" >> $GITHUB_OUTPUT
          echo "scan_completed=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Notify Slack - Security Scan Results
      if: always()
      uses: slackapi/slack-github-action@v1.27.0
      with:
        payload: |
          {
            "text": "🔒 Security Scan Results",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🔒 OWASP Dependency Security Scan Complete"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Repository:*\n${{ github.repository }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n${{ github.ref_name }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Commit SHA:*\n${{ github.sha }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Job Status:*\n${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Scan Status:*\n${{ steps.security-results.outputs.scan_completed == 'true' && '✅ Completed' || '❌ Failed' }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Total Vulnerabilities:*\n${{ steps.security-results.outputs.total }}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Vulnerability Breakdown:*\n🔴 Critical: ${{ steps.security-results.outputs.critical }} | 🟠 High: ${{ steps.security-results.outputs.high }} | 🟡 Medium: ${{ steps.security-results.outputs.medium }} | 🟢 Low: ${{ steps.security-results.outputs.low }}"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View GitHub Actions Run"
                    },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

