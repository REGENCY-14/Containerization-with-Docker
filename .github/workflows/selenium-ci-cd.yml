name: Selenium UI Automation Tests

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  selenium-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Run tests with Maven
      run: mvn clean test -Dheadless=true | tee maven-test-output.txt
      
    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages
        
    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: target/allure-results
        allure_history: allure-history
        keep_reports: 20
        
    - name: Deploy Allure report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: ./allure-report
        
    - name: Upload Allure results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: target/allure-results
        retention-days: 30
        
    - name: Upload Allure report as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-history
        retention-days: 30
        
    - name: Upload Surefire reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports
        path: target/surefire-reports
        retention-days: 30
        
    - name: Test Report Summary
      if: always()
      run: |
        echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -d "target/surefire-reports" ]; then
          echo "### Test Results:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          total_tests=0
          total_failures=0
          total_errors=0
          
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              tests=$(grep -o 'tests="[0-9]*"' "$file" | grep -o '[0-9]*' | head -1)
              failures=$(grep -o 'failures="[0-9]*"' "$file" | grep -o '[0-9]*' | head -1)
              errors=$(grep -o 'errors="[0-9]*"' "$file" | grep -o '[0-9]*' | head -1)
              name=$(grep -o 'name="[^"]*"' "$file" | head -1 | cut -d'"' -f2)
              
              if [ -n "$tests" ]; then
                total_tests=$((total_tests + tests))
                total_failures=$((total_failures + ${failures:-0}))
                total_errors=$((total_errors + ${errors:-0}))
                echo "- **$name**: $tests tests, $failures failures, $errors errors" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done < <(find target/surefire-reports -name "TEST-*.xml")
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total**: $total_tests tests, $total_failures failures, $total_errors errors" >> $GITHUB_STEP_SUMMARY
        else
          echo "ŌÜĀ’ĖÅ No test results found" >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: Extract test results
      if: always()
      id: test_results
      run: |
        COMMIT_SHA=${GITHUB_SHA:0:7}
        TOTAL=0
        FAILED=0
        SKIPPED=0

        # Parse from Maven's final aggregate summary line only.
        # Maven prints individual per-class lines AND a final rolled-up line after "Results:".
        # We grab only the single line that appears directly after "[INFO] Results:" to avoid doubling.
        if [ -f maven-test-output.txt ]; then
          summary_line=$(grep -A5 '\[INFO\] Results:' maven-test-output.txt \
            | grep 'Tests run:' | tail -1)
          echo "Maven summary line: $summary_line"
          TOTAL=$(echo "$summary_line" | sed -n 's/.*Tests run: \([0-9]*\).*/\1/p')
          FAIL=$(echo "$summary_line"  | sed -n 's/.*Failures: \([0-9]*\).*/\1/p')
          ERR=$(echo "$summary_line"   | sed -n 's/.*Errors: \([0-9]*\).*/\1/p')
          SKIPPED=$(echo "$summary_line" | sed -n 's/.*Skipped: \([0-9]*\).*/\1/p')
          TOTAL=${TOTAL:-0}
          FAILED=$((${FAIL:-0} + ${ERR:-0}))
          SKIPPED=${SKIPPED:-0}
        fi

        PASSED=$((TOTAL - FAILED - SKIPPED))
        echo "=== FINAL: total=$TOTAL passed=$PASSED failed=$FAILED skipped=$SKIPPED ==="

        echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
        echo "total=$TOTAL"   >> $GITHUB_OUTPUT
        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "failed=$FAILED" >> $GITHUB_OUTPUT
        echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
        
    - name: Slack notification
      if: always()
      uses: slackapi/slack-github-action@v1.27.0
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      with:
        payload: |
          {
            "text": "CI Pipeline Status\n\n:package: Repository: ${{ github.repository }}\n:herb: Branch: ${{ github.ref_name }}\n:receipt: Commit: ${{ steps.test_results.outputs.commit_sha }}\n:bar_chart: Status: ${{ job.status }}\n\nŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöü\n:chart_with_upwards_trend: Test Summary\nŌĆó Total Tests: ${{ steps.test_results.outputs.total }}\nŌĆó Passed: ${{ steps.test_results.outputs.passed }}\nŌĆó Failed: ${{ steps.test_results.outputs.failed }}\nŌĆó Skipped: ${{ steps.test_results.outputs.skipped }}\nŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöü\n\n:link: Run Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }