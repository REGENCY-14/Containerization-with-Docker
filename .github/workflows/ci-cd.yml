name: CI/CD Pipeline - Selenium Tests with Allure Reports

on:
  push:
    branches: [ main, dev, feature/** ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        browser: [chrome, firefox]
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Install Chrome browser
      uses: browser-actions/setup-chrome@latest
      
    - name: Install Firefox browser
      uses: browser-actions/setup-firefox@latest
      
    - name: Run tests with Maven
      run: |
        mvn clean test -Dbrowser=${{ matrix.browser }} -Dheadless=true
      env:
        DISPLAY: :99
        
    - name: Generate Allure Report
      if: always()
      run: |
        mvn allure:report
        
    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.browser }}
        path: target/allure-results/
        retention-days: 30
        
    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-${{ matrix.browser }}
        path: target/allure-report/
        retention-days: 30
        
    - name: Upload Test Screenshots (if any)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-screenshots-${{ matrix.browser }}
        path: target/screenshots/
        retention-days: 7
        if-no-files-found: ignore

  deploy-allure-report:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Download Allure Results - Chrome
      uses: actions/download-artifact@v4
      with:
        name: allure-results-chrome
        path: target/allure-results-chrome/
        
    - name: Download Allure Results - Firefox
      uses: actions/download-artifact@v4
      with:
        name: allure-results-firefox
        path: target/allure-results-firefox/
        
    - name: Merge Allure Results
      run: |
        mkdir -p target/allure-results-merged
        cp -r target/allure-results-chrome/* target/allure-results-merged/ 2>/dev/null || true
        cp -r target/allure-results-firefox/* target/allure-results-merged/ 2>/dev/null || true
        
    - name: Generate Combined Allure Report
      run: |
        mvn allure:report -Dallure.results.directory=target/allure-results-merged
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: target/allure-report
        destination_dir: allure-report
        
  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Run OWASP Dependency Check
      run: |
        mvn org.owasp:dependency-check-maven:check
        
    - name: Upload Security Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: target/dependency-check-report.html
        retention-days: 30